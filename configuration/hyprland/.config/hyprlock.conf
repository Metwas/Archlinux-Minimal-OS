general {
    hide_cursor = true
    no_fade_in = true
    grace = 0
    disable_loading_bar = true
}

#background {
#    monitor =
#    path = ~/.config/wallpapers/5120x2880.png
#    blur_passes = 3
#}

# -- pywal colors --
#source = $HOME/.cache/wal/colors-hyprland

# -- time --
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $color7
    font_size = 80
    font_family = JetBrains Mono ExtraBold
    position = 0, 100
    halign = center
    valign = center
}

# -- quote --
label {
    monitor =
    text =
    color = "#000"
    font_size = 12
    font_family = JetBrains Mono ExtraLight
    position = 0, 80
    halign = center
    valign = center
}

# -- greeting --
label {
    monitor =
    text = Hi $USER
    color = "#000"
    font_size = 20
    font_family = JetBrains Mono Light
    position = 0, 0
    halign = center
    valign = center
}

# -- password input --
input-field {
    monitor =
    size = 230, 40
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.4
    dots_center = true
    inner_color = "#000"
    font_color = "#FFF"
    fade_on_empty = false
    placeholder_text =
    fail_color = $color7
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}
